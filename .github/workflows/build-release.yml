name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: pip install pyinstaller pystray pillow

      - name: Build exe
        run: pyinstaller PixelTokenPet.spec

      - name: Upload PixelTokenPet.exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PixelTokenPet.exe

  # ── macOS ─────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: pip install pyinstaller pystray pillow

      - name: Build .app
        run: pyinstaller PixelTokenPet.spec

      - name: Zip .app bundle
        run: |
          cd dist
          zip -r PixelTokenPet-macOS.zip PixelTokenPet.app

      - name: Upload PixelTokenPet-macOS.zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PixelTokenPet-macOS.zip
